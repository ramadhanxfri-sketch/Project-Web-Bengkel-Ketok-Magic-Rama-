<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Bagian Rusak - Bengkel Rama</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .part-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .part-item {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            user-select: none;
            text-align: center;
        }

        .part-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .part-item.selected {
            background: var(--primary);
            border-color: #fff;
            box-shadow: var(--glow);
        }

        .part-item p {
            margin: 0;
            font-weight: 600;
            font-size: 0.9rem;
        }

        #summary-box {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="head">
            <h1 id="page-title">Pilih Bagian Yang Rusak</h1>
            <p id="car-info">Mohon pilih bagian mobil mana saja yang ingin diperbaiki.</p>
        </div>

        <div class="part-grid" id="partsContainer">
            <!-- Parts generated by JS -->
        </div>

        <div class="feature-card" id="summary-box">
            <h2>Ringkasan Kerusakan</h2>
            <div id="selected-list" style="margin-bottom: 20px;"></div>
            <div class="nav">
                <a href="#" id="waLink" class="wa-btn">Kirim ke WhatsApp Untuk Harga</a>
            </div>
        </div>

        <div class="nav" style="margin-top: 30px;">
            <a href="javascript:history.back()">← Kembali</a>
            <a href="index.html">Beranda</a>
        </div>
    </div>

    <script>
        // Data Harga Berdasarkan Layanan
        const pricing = {
            'Ketok Magic': {
                "Bumper Depan": 400000,
                "Bumper Belakang": 400000,
                "Kap Mesin": 600000,
                "Bagasi": 500000,
                "Atap Mobil": 800000,
                "Pintu Depan Kanan": 400000,
                "Pintu Depan Kiri": 400000,
                "Pintu Belakang Kanan": 400000,
                "Pintu Belakang Kiri": 400000,
                "Fender Depan Kanan": 400000,
                "Fender Depan Kiri": 400000,
                "Quarter Panel Kanan": 450000,
                "Quarter Panel Kiri": 450000,
                "Spion": 150000,
                "Grill Mobil": 200000
            },
            'Repaint': {
                "Bumper Depan": 600000,
                "Bumper Belakang": 600000,
                "Kap Mesin": 900000,
                "Bagasi": 750000,
                "Atap Mobil": 1200000,
                "Pintu Depan Kanan": 600000,
                "Pintu Depan Kiri": 600000,
                "Pintu Belakang Kanan": 600000,
                "Pintu Belakang Kiri": 600000,
                "Fender Depan Kanan": 600000,
                "Fender Depan Kiri": 600000,
                "Quarter Panel Kanan": 650000,
                "Quarter Panel Kiri": 650000,
                "Spion": 250000,
                "Grill Mobil": 350000
            },
            'Ketok + Cat': {
                "Bumper Depan": 900000,
                "Bumper Belakang": 900000,
                "Kap Mesin": 1400000,
                "Bagasi": 1150000,
                "Atap Mobil": 1800000,
                "Pintu Depan Kanan": 900000,
                "Pintu Depan Kiri": 900000,
                "Pintu Belakang Kanan": 900000,
                "Pintu Belakang Kiri": 900000,
                "Fender Depan Kanan": 900000,
                "Fender Depan Kiri": 900000,
                "Quarter Panel Kanan": 1000000,
                "Quarter Panel Kiri": 1000000,
                "Spion": 350000,
                "Grill Mobil": 500000
            }
        };

        const container = document.getElementById('partsContainer');
        const selectedParts = new Map();

        // Get URL parameters
        const params = new URLSearchParams(window.location.search);
        let service = params.get('service') || 'Ketok Magic';
        const brand = params.get('brand') || '';
        const model = params.get('model') || '';

        // Tentukan data harga yang dipakai
        const currentPricing = pricing[service] || pricing['Ketok Magic'];
        
        // Buat array partsData dari currentPricing
        const partsData = Object.keys(currentPricing).map(name => ({
            name: name,
            price: currentPricing[name]
        }));

        if (brand && model) {
            document.getElementById('car-info').innerText = `Estimasi biaya ${service} untuk ${brand} ${model}`;
        }

        partsData.forEach(part => {
            const div = document.createElement('div');
            div.className = 'part-item';
            div.innerHTML = `
                <p>${part.name}</p>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Rp ${part.price.toLocaleString('id-ID')}</span>
            `;
            div.onclick = () => togglePart(part, div);
            container.appendChild(div);
        });

        function togglePart(part, element) {
            if (selectedParts.has(part.name)) {
                selectedParts.delete(part.name);
                element.classList.remove('selected');
            } else {
                selectedParts.set(part.name, part.price);
                element.classList.add('selected');
            }
            updateSummary();
        }

        function updateSummary() {
            const summaryBox = document.getElementById('summary-box');
            const listEl = document.getElementById('selected-list');
            const waLink = document.getElementById('waLink');

            if (selectedParts.size > 0) {
                summaryBox.style.display = 'block';
                let total = 0;
                let listItems = [];
                
                selectedParts.forEach((price, name) => {
                    total += price;
                    listItems.push(name);
                });

                const count = selectedParts.size;
                const listStr = listItems.join(', ');
                const totalStr = "Rp " + total.toLocaleString('id-ID');
                
                let daysMin = count;
                let daysMax = count + 1;
                if (count > 5) {
                    daysMin = Math.floor(count * 1.2);
                    daysMax = Math.floor(count * 1.5);
                }
                const daysStr = `${daysMin}-${daysMax} Hari`;

                listEl.innerHTML = `
                    <p><strong>Bagian:</strong> ${listStr}</p>
                    <p><strong>Estimasi Waktu:</strong> ${daysStr}</p>
                    <p style="font-size: 1.5rem; color: var(--text-main); margin-top: 10px;"><strong>Total: ${totalStr}</strong></p>
                `;

                const text = `Halo Bengkel Rama, saya ingin tanya harga ${service} untuk ${brand} ${model}. \n\nBagian: ${listStr} \nEstimasi Total: ${totalStr} \nEstimasi Waktu: ${daysStr}.`;
                waLink.href = `https://wa.me/62895424707273?text=${encodeURIComponent(text)}`;
            } else {
                summaryBox.style.display = 'none';
            }
        }
    </script>
<script src="script.js"></script>
</body>
</html>
